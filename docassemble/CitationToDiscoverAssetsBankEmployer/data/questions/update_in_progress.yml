id: dev notice
event: dev_notice
question: |
  January 1, 2026 law change
subquestion: |
  A new law changes post-judgment collection in Illinois. As a result, the statewide Citation to Discover Assets forms have changed.
  
  ILAO is working to update this Easy Form. Until it is ready, you can find fillable PDF versions of the new forms on the [**Illinois Courts website**](https://www.illinoiscourts.gov/forms/approved-forms/forms-approved-forms-circuit-court/post-judgment-collection/).
  
  If you would like to talk with a lawyer about post-judgment collection, use **[Get Legal Help](https://www.illinoislegalaid.org/get-legal-help)** to find free or low-cost legal services in your area.
  
  We apologize for the inconvenience.
